<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>santander | Transfer</title>
  <meta name="description" content="">
  <meta name="keywords" content="">
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&family=Raleway:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="index-page">
<header id="header" class="header d-flex align-items-center" style="background-color: red;">
  <div class="container-fluid container-xl d-flex align-items-center justify-content-between">
      <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      <nav id="navmenu" class="navmenu">
          <ul>
              <li><a href="personal.html" class="active text-white">Personal</a></li>
              <li><a href="private.html" class="text-white">Private</a></li>
              <li><a href="business.html" class="text-white">Business</a></li>
              <li><a href="corporate.html" class="text-white">Corporate</a></li>
          </ul>
      </nav>

      <div class="ms-auto">
            <a class="btn-getstarted" href="inside.html">Dashboard</a>
            <a class="btn-getstarted" href="customer-support.html">Contact</a>
            <button class="btn-getstarted bg-white border-0" onclick="logout()" style="color: red;">Log out</button>
    </div>
  </div>
</header>
<header id="header" class="header align-items-center">
  <div class="container-fluid container-xl position-relative d-flex align-items-center">
    <a href="inside.html" class="logo d-flex align-items-center me-auto">
      <img src="img/logo.png" alt="" class="img-fluid" >
      <h4 class="pt-3 fw-bold" style="color: red;">Santander</h4>
    </a>
    <nav id="navmenu" class="navmenu"></nav>
  </div>
</header>
<main class="main">
  <div class="container mt-5">
      <div class="row mb-4">
          <div class="col-12">
              <a href="inside.html" class="text-decoration-none" style="color: red;"><i class="bi bi-arrow-left me-2"></i>Back to Dashboard</a>
          </div>
      </div>
      <div class="row">
          <div class="col-lg-6 offset-lg-3">
              <div class="card shadow-sm border-0">
                  <div class="card-body p-4">
                      <h5 class="card-title fw-bold mb-4">Transfer Between Accounts</h5>
                      <form id="transferForm">
                          <div class="mb-3">
                              <label for="fromAccount" class="form-label">From Account</label>
                              <select class="form-select" id="fromAccount" required>
                                  <option value="">Choose account</option>
                              </select>
                          </div>
                          <div class="mb-3">
                              <label for="toAccount" class="form-label">To Account</label>
                              <select class="form-select" id="toAccount" required>
                                  <option value="">Choose account</option>
                              </select>
                          </div>
                          <div class="mb-3">
                              <label for="amount" class="form-label">Amount (CHF)</label>
                              <input type="number" step="0.01" min="0" class="form-control" id="amount" required>
                          </div>
                          <div class="mb-3">
                              <label for="description" class="form-label">Description (optional)</label>
                              <input type="text" class="form-control" id="description">
                          </div>
                          <button type="submit" class="btn btn-danger w-100">Send Transfer</button>
                      </form>
                      <div id="transferResult" class="mt-3"></div>
                  </div>
              </div>
          </div>
      </div>
  </div>
</main>
<hr />
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async function(){
    const userStr=localStorage.getItem('santander_user');
    if(!userStr){window.location.href='login.html';return;}
    const user=JSON.parse(userStr);
    try{
      const dash=await fetch(`/api/user/${user.username}/dashboard`);
      const ddata=await dash.json();
      if(ddata.success){
        const fromSel=document.getElementById('fromAccount');
        const toSel=document.getElementById('toAccount');
        ddata.accounts.forEach(acc=>{
          const o1=document.createElement('option');o1.value=acc.account_number;
          o1.textContent=`${acc.account_type} - ${acc.account_number} (${new Intl.NumberFormat('en-GB',{style:'currency',currency:'CHF'}).format(acc.balance)})`;
          const o2=o1.cloneNode(true);
          fromSel.appendChild(o1);
          toSel.appendChild(o2);
        });
      }
    }catch(e){console.error('load accounts',e);}    
    document.getElementById('transferForm').addEventListener('submit',async function(e){
      e.preventDefault();
      const from=document.getElementById('fromAccount').value;
      const to=document.getElementById('toAccount').value;
      const amt=document.getElementById('amount').value;
      const desc=document.getElementById('description').value;
      const out=document.getElementById('transferResult');out.innerHTML='';
      if(from===to){out.innerHTML='<div class="alert alert-danger">Source and destination cannot be the same.</div>';return;}
      try{
        const res=await fetch('/api/transfer',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({fromAccount:from,toAccount:to,amount:amt,description:desc})});
        const data=await res.json();
        if(data.success){out.innerHTML=`<div class="alert alert-success">Transfer complete. New balance: CHF ${data.fromBalance.toFixed(2)}</div>`;setTimeout(()=>location.reload(),1500);}else{out.innerHTML=`<div class="alert alert-danger">${data.message}</div>`;}
      }catch(err){console.error(err);out.innerHTML='<div class="alert alert-danger">Error sending transfer.</div>';}    
    });
  });
  function logout(){localStorage.removeItem('santander_user');window.location.href='index.html';}
</script>
</body>
</html>
